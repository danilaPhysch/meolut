services:
  postgres:
    image: postgres:16
    container_name: ephemerishub_postgres
    environment:
      POSTGRES_DB: ephemerishub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ephemerishub_network

  ephemerishub:
    build:
      context: .
      dockerfile: Dockerfile
    image: ephemerishub:latest
    container_name: ephemerishub_api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=ephemerishub;Username=postgres;Password=postgres"
    ports:
      - "5101:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - ephemerishub_network
    restart: unless-stopped

networks:
  ephemerishub_network:
    driver: bridge

volumes:
  postgres_data:
